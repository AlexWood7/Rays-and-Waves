function pickLensAt(xcm,ycm){
 rebuildLensCache(); // ensure fresh geometry
 let hit=-1; // prefer last-drawn lens on top
 for(let i=lensCache.length-1;i>=0;i--){ 
  const c=lensCache[i]; 
  if(!c) continue; 
  
  // Check if point is inside the element
  if(pointInsideLensCached(c,xcm,ycm)){ 
   hit=i; 
   break; 
  }
  
  // For mirrors, add expanded hit region (2cm buffer)
  if(c.L.isMirror){
   const mirrorBuffer = 2.0; // 2cm buffer zone around mirrors
   let testX = xcm, testY = ycm;
   
   // Apply rotation if needed
   if(c.angle){
    const centerX = c.L.xcm;
    const centerY = c.L.ycm;
    const angleRad = c.angle * Math.PI / 180;
    const dx = xcm - centerX;
    const dy = ycm - centerY;
    testX = centerX + dx * Math.cos(angleRad) - dy * Math.sin(angleRad);
    testY = centerY + dx * Math.sin(angleRad) + dy * Math.cos(angleRad);
   }
   
   const ys = c.ys, xl = c.xl, xr = c.xr;
   // Check if within vertical bounds (with buffer)
   if(testY >= ys[0] - mirrorBuffer && testY <= ys[ys.length-1] + mirrorBuffer){
    // Find closest point on mirror
    let lo=0, hi=ys.length-1;
    if(testY < ys[0]) lo = hi = 0;
    else if(testY > ys[ys.length-1]) lo = hi = ys.length-1;
    else {
     while(hi-lo>1){ const mid=(lo+hi)>>1; if(testY>=ys[mid]) lo=mid; else hi=mid; }
    }
    const t=(testY-ys[lo])/Math.max(1e-9,(ys[hi]-ys[lo]));
    const xL = xl[lo]*(1-t)+xl[hi]*t;
    const xR = xr[lo]*(1-t)+xr[hi]*t;
    
    // Check if within horizontal buffer
    if(testX >= xL - mirrorBuffer && testX <= xR + mirrorBuffer){
     hit = i;
     break;
    }
   }
  }
 }
 return hit;
}
function isPointSourceHit(xcm,ycm){
 const waveType = getWaveType();
 if(waveType === 'point'){
 const dx = xcm - pointSourceXcm;
 const dy = ycm - pointSourceYcm;
 return Math.hypot(dx,dy) < 1.5; // 1.5cm hit radius
 } else if(waveType === 'plane'){
 const dx = xcm - planeWaveXcm;
 const dy = ycm - planeWaveYcm;
 return Math.hypot(dx,dy) < 1.5; // 1.5cm hit radius
 }
 return false;
}
// Helper function to calculate rotated lens endpoint positions
function getLensEndpoints(cache, L){
 const ys = cache.ys;
 const xl = cache.xl;
 const angle = L.angle * Math.PI / 180;
 const centerX = L.xcm;
 const centerY = L.ycm;
 const cos = Math.cos(angle);
 const sin = Math.sin(angle);
 
 // Top endpoint - from cache geometry (local coordinates)
 const topLocalX = xl[0];
 const topLocalY = ys[0];
 // Transform back to world coordinates (inverse rotation)
 const topX = centerX + (topLocalX - centerX) * cos + (topLocalY - centerY) * sin;
 const topY = centerY - (topLocalX - centerX) * sin + (topLocalY - centerY) * cos;
 
 // Bottom endpoint - from cache geometry (local coordinates)
 const botLocalX = xl[ys.length - 1];
 const botLocalY = ys[ys.length - 1];
 // Transform back to world coordinates (inverse rotation)
 const botX = centerX + (botLocalX - centerX) * cos + (botLocalY - centerY) * sin;
 const botY = centerY - (botLocalX - centerX) * sin + (botLocalY - centerY) * cos;
 
 // For prisms, add third corner (right base corner)
 let thirdX = null, thirdY = null;
 if(L.isBlock && L.blockType === 'prism'){
  const thirdLocalX = cache.xr[0]; // Right corner at base (index 0)
  const thirdLocalY = ys[0]; // Same y as base
  thirdX = centerX + (thirdLocalX - centerX) * cos + (thirdLocalY - centerY) * sin;
  thirdY = centerY - (thirdLocalX - centerX) * sin + (thirdLocalY - centerY) * cos;
 }
 
 return {topX, topY, botX, botY, thirdX, thirdY};
}

// Get rotation handle positions (edge centers)
function getRotationHandlePositions(cache, L){
 const angle = L.angle * Math.PI / 180;
 const cos = Math.cos(angle);
 const sin = Math.sin(angle);
 
 if(L.isBlock){
  // For blocks: handles at edge centers
  let height = L.scale || 20;
  let width = L.width || 10;
  
  if(L.blockType === 'prism'){
   const halfAngle = (L.vertexAngle || 60) * Math.PI / 360;
   width = height * Math.tan(halfAngle);
   
   // For prisms: rotation handles at edge centers (midway between vertices)
   const handles = [];
   
   // Calculate vertex positions first
   const apexY = height / 2;
   const baseY = -height / 2;
   const leftX = -width;
   const rightX = width;
   
   // Left edge center (midpoint between apex and left base corner)
   const leftEdgeCenterLocalX = leftX / 2;
   const leftEdgeCenterLocalY = 0;
   handles.push({
    x: L.xcm + leftEdgeCenterLocalX * cos + leftEdgeCenterLocalY * sin,
    y: L.ycm - leftEdgeCenterLocalX * sin + leftEdgeCenterLocalY * cos,
    id: 'left-edge'
   });
   
   // Right edge center (midpoint between apex and right base corner)
   const rightEdgeCenterLocalX = rightX / 2;
   const rightEdgeCenterLocalY = 0;
   handles.push({
    x: L.xcm + rightEdgeCenterLocalX * cos + rightEdgeCenterLocalY * sin,
    y: L.ycm - rightEdgeCenterLocalX * sin + rightEdgeCenterLocalY * cos,
    id: 'right-edge'
   });
   
   // Base edge center (midpoint between left and right base corners)
   const baseEdgeCenterLocalX = 0;
   const baseEdgeCenterLocalY = baseY;
   handles.push({
    x: L.xcm + baseEdgeCenterLocalX * cos + baseEdgeCenterLocalY * sin,
    y: L.ycm - baseEdgeCenterLocalX * sin + baseEdgeCenterLocalY * cos,
    id: 'base-edge'
   });
   
   return handles;
  } else if(L.blockType === 'curved'){
   width = height * 0.3;
   
   // For curved blocks: only rotation handle on curved surface at equator
   const handles = [];
   
   // Curved surface center (at the side, one radius from center along the perpendicular axis)
   const radius = height / 2; // Radius of the semicircle
   const curvedSurfaceCenterLocalX = radius; // One radius to the side (perpendicular to straight edge)
   const curvedSurfaceCenterLocalY = 0; // At the equator height
   handles.push({
    x: L.xcm + curvedSurfaceCenterLocalX * cos + curvedSurfaceCenterLocalY * sin,
    y: L.ycm - curvedSurfaceCenterLocalX * sin + curvedSurfaceCenterLocalY * cos,
    id: 'curved-surface'
   });
   
   return handles;
  }
  
  const handles = [];
  
  // Top edge center
  const topY = height / 2;
  handles.push({
   x: L.xcm + topY * sin,
   y: L.ycm + topY * cos,
   id: 'top'
  });
  
  // Bottom edge center
  const botY = -height / 2;
  handles.push({
   x: L.xcm + botY * sin,
   y: L.ycm + botY * cos,
   id: 'bottom'
  });
  
  if(L.blockType === 'rectangular'){
   // Left edge center
   const leftX = -width / 2;
   handles.push({
    x: L.xcm + leftX * cos,
    y: L.ycm - leftX * sin,
    id: 'left'
   });
   
   // Right edge center
   const rightX = width / 2;
   handles.push({
    x: L.xcm + rightX * cos,
    y: L.ycm - rightX * sin,
    id: 'right'
   });
  }
  
  return handles;
 } else {
  // For lenses/mirrors: handles at midpoint of left and right curved surfaces
  const ys = cache.ys;
  const xl = cache.xl;
  const xr = cache.xr;
  const midIdx = Math.floor(ys.length / 2);
  
  const centerX = L.xcm;
  const centerY = L.ycm;
  
  // For mirrors, add extra offset to make handles easier to grab
  const mirrorOffset = L.isMirror ? 1.5 : 0; // Push handles 1.5 cm further from surface in world coords
  
  // Left surface center
  const leftLocalX = xl[midIdx];
  const leftLocalY = ys[midIdx];
  const leftOffsetX = leftLocalX - centerX - mirrorOffset; // Extend further left for mirrors
  const leftOffsetY = leftLocalY - centerY;
  const leftX = centerX + leftOffsetX * cos + leftOffsetY * sin;
  const leftY = centerY - leftOffsetX * sin + leftOffsetY * cos;
  
  // Right surface center
  const rightLocalX = xr[midIdx];
  const rightLocalY = ys[midIdx];
  const rightOffsetX = rightLocalX - centerX + mirrorOffset; // Extend further right for mirrors
  const rightOffsetY = rightLocalY - centerY;
  const rightX = centerX + rightOffsetX * cos + rightOffsetY * sin;
  const rightY = centerY - rightOffsetX * sin + rightOffsetY * cos;
  
  return [
   {x: leftX, y: leftY, id: 'left'},
   {x: rightX, y: rightY, id: 'right'}
  ];
 }
}

// Get stretch handle positions (vertices/corners)
function getStretchHandlePositions(cache, L){
 const angle = L.angle * Math.PI / 180;
 const cos = Math.cos(angle);
 const sin = Math.sin(angle);
 
 if(L.isBlock){
  // For blocks: handles at vertices
  let height = L.scale || 20;
  let width = L.width || 10;
  
  if(L.blockType === 'prism'){
   const halfAngle = (L.vertexAngle || 60) * Math.PI / 360;
   width = height * Math.tan(halfAngle);
   
   // Prism has 3 vertices: apex (top center), left base, right base
   const handles = [];
   
   // Apex at top
   const apexY = height / 2;
   handles.push({
    x: L.xcm + apexY * sin,
    y: L.ycm + apexY * cos,
    id: 'apex'
   });
   
   // Left base corner
   const baseY = -height / 2;
   const leftX = -width;
   handles.push({
    x: L.xcm + leftX * cos + baseY * sin,
    y: L.ycm - leftX * sin + baseY * cos,
    id: 'base-left'
   });
   
   // Right base corner
   const rightX = width;
   handles.push({
    x: L.xcm + rightX * cos + baseY * sin,
    y: L.ycm - rightX * sin + baseY * cos,
    id: 'base-right'
   });
   
   return handles;
  } else if(L.blockType === 'curved'){
   // Curved block: 2 handles at ends of diameter (straight edge)
   const handles = [];
   const radius = height / 2; // Radius is half the height (diameter)
   
   // Bottom end of straight edge (at 0 horizontally, -radius vertically from center)
   const leftLocalX = 0;
   const leftLocalY = -radius;
   handles.push({
    x: L.xcm + leftLocalX * cos + leftLocalY * sin,
    y: L.ycm - leftLocalX * sin + leftLocalY * cos,
    id: 'straight-left'
   });
   
   // Top end of straight edge (at 0 horizontally, +radius vertically from center)
   const rightLocalX = 0;
   const rightLocalY = radius;
   handles.push({
    x: L.xcm + rightLocalX * cos + rightLocalY * sin,
    y: L.ycm - rightLocalX * sin + rightLocalY * cos,
    id: 'straight-right'
   });
   
   return handles;
  } else {
   // Rectangular block: 4 corners
   const handles = [];
   const halfWidth = width / 2;
   const halfHeight = height / 2;
   
   // Top-left
   handles.push({
    x: L.xcm - halfWidth * cos + halfHeight * sin,
    y: L.ycm + halfWidth * sin + halfHeight * cos,
    id: 'top-left'
   });
   
   // Top-right
   handles.push({
    x: L.xcm + halfWidth * cos + halfHeight * sin,
    y: L.ycm - halfWidth * sin + halfHeight * cos,
    id: 'top-right'
   });
   
   // Bottom-left
   handles.push({
    x: L.xcm - halfWidth * cos - halfHeight * sin,
    y: L.ycm + halfWidth * sin - halfHeight * cos,
    id: 'bottom-left'
   });
   
   // Bottom-right
   handles.push({
    x: L.xcm + halfWidth * cos - halfHeight * sin,
    y: L.ycm - halfWidth * sin - halfHeight * cos,
    id: 'bottom-right'
   });
   
   return handles;
  }
 } else {
  // For lenses/mirrors: use the endpoints (top and bottom)
  return getLensEndpoints(cache, L);
 }
}

function checkStretchHandleHit(xcm, ycm){
 // Check if pointer is near a stretch handle (vertex/corner)
 const hitRadius = 1.5; // 1.5cm hit radius
 rebuildLensCache();
 for(let i = lensCache.length - 1; i >= 0; i--){
  const cache = lensCache[i];
  if(!cache || !cache.L.enabled) continue;
  const L = cache.L;
  
  // Get stretch handle positions (vertices)
  const handles = getStretchHandlePositions(cache, L);
  
  // For lenses/mirrors, handles is an object with topX, topY, botX, botY
  if(!L.isBlock){
   const distTop = Math.hypot(xcm - handles.topX, ycm - handles.topY);
   if(distTop < hitRadius){
    return {idx: i, corner: 'top'};
   }
   const distBot = Math.hypot(xcm - handles.botX, ycm - handles.botY);
   if(distBot < hitRadius){
    return {idx: i, corner: 'bottom'};
   }
  } else {
   // For blocks, handles is an array
   for(const handle of handles){
    const dist = Math.hypot(xcm - handle.x, ycm - handle.y);
    if(dist < hitRadius){
     return {idx: i, corner: handle.id};
    }
   }
  }
 }
 return null;
}
function checkRotationHandleHit(xcm, ycm){
 // Check if pointer is near an edge center for rotation
 const hitRadius = 2.0; // 2cm hit radius
 rebuildLensCache();
 for(let i = lensCache.length - 1; i >= 0; i--){
 const cache = lensCache[i];
 if(!cache || !cache.L.enabled) continue;
 const L = cache.L;
 
 // Get rotation handle positions (edge centers)
 const handles = getRotationHandlePositions(cache, L);
 
 // Check distance to each handle
 for(const handle of handles){
  const dist = Math.hypot(xcm - handle.x, ycm - handle.y);
  if(dist < hitRadius){
   return {idx: i, end: handle.id};
  }
 }
 }
 return null;
}
function checkFocalPointHit(xcm, ycm){
 // Check if pointer is near a focal point
 const hitRadius = 1.5; // 1.5cm hit radius
 for(let i = 0; i < lenses.length; i++){
  const L = lenses[i];
  if(!L.enabled) continue;
  // Skip planar mirrors and blocks
  if(L.isMirror && L.type === 'planar') continue;
  if(L.isBlock) continue;
  
  // For mirrors, use R/2 as focal length; for lenses, use fTarget
  const fAbs = L.isMirror ? Math.abs(L.R / 2) : Math.abs(L.fTarget || 50);
  const angleRad = (L.angle || 0) * Math.PI / 180;
  const cosAngle = Math.cos(angleRad);
  const sinAngle = Math.sin(angleRad);
  
  // Calculate focal point positions
  const fOffsetPos = (L.type==='convex') ? fAbs : -fAbs;
  const fOffsetNeg = (L.type==='convex') ? -fAbs : fAbs;
  
  const fPosX = L.xcm + fOffsetPos * cosAngle;
  const fPosY = L.ycm - fOffsetPos * sinAngle;
  const fNegX = L.xcm + fOffsetNeg * cosAngle;
  const fNegY = L.ycm - fOffsetNeg * sinAngle;
  
  // Check positive focal point
  const distPos = Math.hypot(xcm - fPosX, ycm - fPosY);
  if(distPos < hitRadius){
   return {idx: i, side: 'positive'};
  }
  
  // For lenses, also check negative focal point
  if(!L.isMirror){
   const distNeg = Math.hypot(xcm - fNegX, ycm - fNegY);
   if(distNeg < hitRadius){
    return {idx: i, side: 'negative'};
   }
  }
 }
 return null;
}

// Modular handlers for different drag interactions to keep pointerdown listener clean

function handlePointSourceGrab(xcm, ycm, e) {
  const waveType = getWaveType();
  if(waveType === 'point') interactionController.dragPointSource = true;
  else if(waveType === 'plane') interactionController.dragPlaneWave = true;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
  e.preventDefault();
  return true;
}

function handleRotationGrab(rotHandle, xcm, ycm, e) {
  interactionController.dragRotation = true;
  revealHandlesFor(rotHandle.idx);
  interactionController.dragRotationIdx = rotHandle.idx;
  interactionController.dragRotationEnd = rotHandle.end;
  const L = lenses[rotHandle.idx];
  interactionController.dragStartAngle = L.angle || 0;
  const dx = xcm - L.xcm;
  const dy = ycm - L.ycm;
  interactionController.dragStartMouseAngle = Math.atan2(dy, dx) * 180 / Math.PI;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
  e.preventDefault();
  return true;
}

function handleStretchGrab(stretchHandle, e) {
  interactionController.dragStretch = true;
  revealHandlesFor(stretchHandle.idx);
  interactionController.dragStretchIdx = stretchHandle.idx;
  interactionController.dragStretchCorner = stretchHandle.corner;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
  e.preventDefault();
  return true;
}

function handleFocalPointGrab(focalHit, xcm, ycm, e) {
  interactionController.dragFocalPoint = true;
  revealHandlesFor(focalHit.idx);
  interactionController.dragFocalLensIdx = focalHit.idx;
  interactionController.dragFocalSide = focalHit.side;
  const L = lenses[focalHit.idx];
  interactionController.dragFocalStartF = L.fTarget || 50;
  const angleRad = (L.angle || 0) * Math.PI / 180;
  const cosAngle = Math.cos(angleRad);
  const sinAngle = Math.sin(angleRad);
  const dx = xcm - L.xcm;
  const dy = ycm - L.ycm;
  interactionController.dragFocalStartDistance = dx * cosAngle - dy * sinAngle;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
  e.preventDefault();
  return true;
}

function handleLensGrab(idx, xcm, ycm, e) {
  interactionController.dragLensIdx = idx;
  revealHandlesFor(idx);
  interactionController.dragDX = lenses[idx].xcm - xcm;
  interactionController.dragDY = lenses[idx].ycm - ycm;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
  e.preventDefault();
  return true;
}

function handlePanStart(e) {
  interactionController.dragPan = true;
  const rect = canvas.getBoundingClientRect();
  interactionController.panStartX = e.clientX - rect.left;
  interactionController.panStartY = e.clientY - rect.top;
  interactionController.panStartOffsetX = viewport.offsetX;
  interactionController.panStartOffsetY = viewport.offsetY;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
  e.preventDefault();
  return true;
}

canvas.addEventListener('pointerdown', (e)=>{
  // Block drag if pinch-zoom is in progress
  if (typeof touchZoomLastDist !== 'undefined' && touchZoomLastDist !== null) {
    // Let pinch-zoom take precedence, do not start drag
    return;
  }
 const {xcm,ycm}=pxToCm(e);
 
 // Check interactions in priority order
 // Check direction arrow first (higher priority than source)
 if(isDirectionArrowHit(xcm, ycm)){
  interactionController.dragDirectionArrow = true;
  manualDirectionMode = true;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
  e.preventDefault();
  return;
 }
 
 if(isPointSourceHit(xcm,ycm)) {
   handlePointSourceGrab(xcm, ycm, e);
   return;
 }
 
 const rotHandle = checkRotationHandleHit(xcm, ycm);

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    touchZoomLastDist = getTouchDist(e);
    touchZoomLastMid = getTouchMidpoint(e);
    e.preventDefault();
  }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const dist = getTouchDist(e);
    const mid = getTouchMidpoint(e);
    if (touchZoomLastDist && touchZoomLastMid && dist && mid) {
      const ratio = dist / touchZoomLastDist;
      const zoomFactor = 1.03;
      // Add a small deadzone to prevent jitter from involuntary movement
      const deadzone = 0.01; // 1% deadzone
      if (Math.abs(ratio - 1) > deadzone) {
        // Get world coordinates of midpoint before zoom
        const prevWorld = viewport.screenToWorld(touchZoomLastMid.x, touchZoomLastMid.y);
        // Apply zoom
        let newZoom = viewport.zoomLevel;
        if (ratio > 1) newZoom = Math.min(viewport.zoomLevel * zoomFactor, 2.0);
        else newZoom = Math.max(viewport.zoomLevel / zoomFactor, 0.4667);
        viewport.setZoom(newZoom);
        // Get world coordinates of midpoint after zoom
        const newWorld = viewport.screenToWorld(mid.x, mid.y);
        // Adjust pan so the world point under the midpoint stays fixed
        const dx = prevWorld.xcm - newWorld.xcm;
        const dy = prevWorld.ycm - newWorld.ycm;
        viewport.pan(dx, dy);
        recalcScaleAndRange();
      }
    }
    touchZoomLastDist = dist;
    touchZoomLastMid = mid;
    e.preventDefault();
  }
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  // Only reset pinch-zoom state when ALL touches are lifted
  if (e.touches.length === 0) {
    touchZoomLastDist = null;
    touchZoomLastMid = null;
  }
});

// Helper function to draw a single rotation handle
function drawSingleRotationHandle(x, y, handleRadiusPx, isActive){
 ctx.save(); // Save state to ensure clean drawing context
 
 // Draw handle circle
 ctx.beginPath();
 ctx.arc((x - viewport.offsetX) * viewport.scaleX, worldYtoPxY(y - viewport.offsetY), handleRadiusPx, 0, Math.PI * 2);
 if(isActive){
  ctx.fillStyle = 'rgba(100, 200, 255, 0.9)'; // Highlight
 } else {
  // White background for visibility
  ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
 }
 ctx.fill();
 
 // Set stroke color based on invert mode
 ctx.strokeStyle = invertColors ? 'rgba(255, 255, 255, 0.8)' : 'rgba(0, 0, 0, 0.6)';
 ctx.lineWidth = 2;
 ctx.stroke();
 
 // Draw rotation icon (curved arrow)
 ctx.strokeStyle = invertColors ? 'rgba(255, 255, 255, 0.8)' : 'rgba(0, 0, 0, 0.7)';
 ctx.lineWidth = 1.5;
 ctx.beginPath();
 const iconR = handleRadiusPx * 0.4;
 const centerPx = (x - viewport.offsetX) * viewport.scaleX;
 const centerPy = worldYtoPxY(y - viewport.offsetY);
 const arcEnd = Math.PI * 1.7;
 ctx.arc(centerPx, centerPy, iconR, 0.3, arcEnd);
 ctx.stroke();
 
 // Arrow head - calculate tangent direction at end of arc
 const arrowX = centerPx + iconR * Math.cos(arcEnd);
 const arrowY = centerPy + iconR * Math.sin(arcEnd);
 // Tangent to the arc (perpendicular to radius, in direction of motion)
 const tangentAngle = arcEnd + Math.PI / 2; // Perpendicular for counterclockwise arc
 const arrowSize = 4;
 
 ctx.beginPath();
 ctx.moveTo(arrowX, arrowY);
 ctx.lineTo(
  arrowX - arrowSize * Math.cos(tangentAngle - 0.4),
  arrowY - arrowSize * Math.sin(tangentAngle - 0.4)
 );
 ctx.moveTo(arrowX, arrowY);
 ctx.lineTo(
  arrowX - arrowSize * Math.cos(tangentAngle + 0.4),
  arrowY - arrowSize * Math.sin(tangentAngle + 0.4)
 );
 ctx.stroke();
 
 ctx.restore(); // Restore saved state
}
function drawLenses(){
 const lensColors = [
 { stroke: 'rgba(100,160,255,1.0)' }, // 1 blue (Lens 1)
 { stroke: 'rgba(255,165,0,1.0)' }, // 2 orange (Lens 2)
 { stroke: 'rgba(186,85,211,1.0)' }, // 3 purple (Lens 3)
 { stroke: 'rgba(100,160,255,1.0)' }, // 4 blue (Mirror 1)
 { stroke: 'rgba(255,165,0,1.0)' }, // 5 orange (Mirror 2)
 { stroke: 'rgba(186,85,211,1.0)' }, // 6 purple (Mirror 3)
 { stroke: 'rgba(100,160,255,1.0)' }, // 7 blue (Block 1)
 { stroke: 'rgba(255,165,0,1.0)' }, // 8 orange (Block 2)
 { stroke: 'rgba(186,85,211,1.0)' } // 9 purple (Block 3)
];
 const fillColor = 'rgba(100,160,255,0.2)'; // Original blue lens fill
 const backingFillColor = 'rgba(60,60,60,0.8)'; // Dark backing for mirrors
 ctx.save();
 // Apply global pan offset to all lens paths
 ctx.translate(-viewport.offsetX * viewport.scaleX, viewport.offsetY * viewport.scaleY);
 for(let i=0;i<lenses.length;i++){
 const L=lenses[i]; if(!L.enabled) continue; const cache=lensCache[i]; if(!cache||!cache.path) continue; 
 ctx.save(); ctx.lineWidth=8/Math.max(viewport.scaleX,viewport.scaleY);
 // Apply rotation for all optical elements
 if(cache.angle){
 const centerX = L.xcm * viewport.scaleX;
 const centerY = worldYtoPxY(L.ycm);
 ctx.translate(centerX, centerY);
 ctx.rotate(cache.angle * Math.PI / 180);
 ctx.translate(-centerX, -centerY);
 }
 // Draw backing layer first (for mirrors)
 if(L.isMirror && cache.backingPath){
 ctx.fillStyle=backingFillColor;
 ctx.fill(cache.backingPath);
 ctx.strokeStyle=lensColors[i].stroke;
 ctx.stroke(cache.backingPath);
 }
 // Draw main glass/reflective layer
 ctx.fillStyle=fillColor; ctx.fill(cache.path);
 ctx.strokeStyle=lensColors[i].stroke; ctx.stroke(cache.path);
 ctx.restore();
 }
 ctx.restore(); // Restore global pan offset transform
 // Draw rotation handles for mirrors and blocks
 drawRotationHandles();
 // Draw stretch handles at vertices/corners
 drawStretchHandles();
  drawFocalLengthHandles();
}

function drawRotationHandles(){
  // Draw rotation handles when hovered/dragged OR recently touched (reveal timer)
  const now = performance.now();
  rebuildLensCache();
  for(let i=0; i<lenses.length; i++){
    const L = lenses[i];
    if(!L || !L.enabled) continue;
    const reveal = isHandleRevealActive(i);
    const show = reveal ||
      interactionController.hoverRotationIdx === i ||
      interactionController.dragRotationIdx === i ||
      interactionController.hoverStretchIdx === i ||
      interactionController.dragStretchIdx === i ||
      interactionController.hoverFocalPointIdx === i ||
      interactionController.dragFocalLensIdx === i;
    if(!show) continue;
    const cache = lensCache[i];
    if(!cache) continue;
    const handles = getRotationHandlePositions(cache, L);
    ctx.save();
    const handleRadiusPx = 10;
    const activeEnd = (interactionController.dragRotationIdx === i) ? interactionController.dragRotationEnd : ((interactionController.hoverRotationIdx === i) ? interactionController.hoverRotationEnd : null);
    for(const handle of handles){
      drawSingleRotationHandle(handle.x, handle.y, handleRadiusPx, activeEnd === handle.id);
    }
    ctx.restore();
  }
}


function drawStretchHandles(){
  // Draw stretch handles (vertices/corners) when hovered/dragged OR recently touched
  rebuildLensCache();
  for(let i=0; i<lenses.length; i++){
    const L = lenses[i];
    if(!L || !L.enabled) continue;
    const show = isHandleRevealActive(i) ||
      interactionController.hoverStretchIdx === i ||
      interactionController.dragStretchIdx === i ||
      interactionController.hoverRotationIdx === i ||
      interactionController.dragRotationIdx === i ||
      interactionController.hoverFocalPointIdx === i ||
      interactionController.dragFocalLensIdx === i;
    if(!show) continue;
    const cache = lensCache[i];
    if(!cache) continue;
    const handles = getStretchHandlePositions(cache, L);
    ctx.save();
    const handleRadiusPx = 8;
    const activeCorner = (interactionController.dragStretchIdx === i) ? interactionController.dragStretchCorner : ((interactionController.hoverStretchIdx === i) ? interactionController.hoverStretchCorner : null);
    if(!L.isBlock){
      // For lenses/mirrors: handles object with topX, topY, botX, botY
      drawStretchHandle(handles.topX, handles.topY, handleRadiusPx, activeCorner === 'top', false);
      drawStretchHandle(handles.botX, handles.botY, handleRadiusPx, activeCorner === 'bottom', false);
    } else {
      for(const handle of handles){
        const isPrismApex = (L.blockType === 'prism' && handle.id === 'apex');
        drawStretchHandle(handle.x, handle.y, handleRadiusPx, activeCorner === handle.id, isPrismApex);
      }
    }
    ctx.restore();
  }
}


function drawFocalLengthHandles(){
  ctx.save();
  for(let i=0;i<lenses.length;i++){
    const L = lenses[i];
    if(!L || !L.enabled) continue;
    if(L.isBlock) continue;
    if(L.isMirror && L.type === 'planar') continue;

    const reveal = isHandleRevealActive(i);
    const show = reveal ||
                 interactionController.hoverRotationIdx === i || interactionController.dragRotationIdx === i ||
                 interactionController.hoverStretchIdx === i  || interactionController.dragStretchIdx === i  ||
                 interactionController.hoverFocalPointIdx === i|| interactionController.dragFocalLensIdx === i;
    if(!show) continue;

    const fAbs = L.isMirror ? Math.abs(L.R / 2) : Math.abs(L.fTarget || 50);
    const angleRad = (L.angle || 0) * Math.PI / 180;
    const cosA = Math.cos(angleRad), sinA = Math.sin(angleRad);

    // Signed focal offset consistent with existing hit-test logic
    const fPos = (L.type === 'convex') ? fAbs : -fAbs;
    const fxPos = L.xcm + fPos * cosA;
    const fyPos = L.ycm - fPos * sinA;

    const radiusPx = 8;
    const activeSide = (interactionController.dragFocalLensIdx === i) ? interactionController.dragFocalSide : null;

    function drawHandleAt(xcm,ycm,isActive){
      const px = (xcm - viewport.offsetX) * viewport.scaleX;
      const py = viewport.worldYtoPxY(ycm);
      ctx.beginPath();
      ctx.arc(px, py, radiusPx, 0, Math.PI*2);
      ctx.fillStyle = isActive ? 'rgba(100,255,100,0.9)' : 'rgba(200,200,200,0.8)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    if(L.isMirror){
      // Mirrors have a single focal point: draw only the positive-side one used by hit testing
      drawHandleAt(fxPos, fyPos, activeSide === 'positive');
    } else {
      // Lenses: draw both +f and -f handles
      const fNeg = -fPos;
      const fxNeg = L.xcm + fNeg * cosA;
      const fyNeg = L.ycm - fNeg * sinA;
      drawHandleAt(fxPos, fyPos, activeSide === 'positive');
      drawHandleAt(fxNeg, fyNeg, activeSide === 'negative');
    }
  }
  ctx.restore();
}

function drawStretchHandle(x, y, radiusPx, isActive, isPrismApex){
 const px = (x - viewport.offsetX) * viewport.scaleX;
 const py = viewport.worldYtoPxY(y);
 
 ctx.beginPath();
 ctx.arc(px, py, radiusPx, 0, Math.PI * 2);
 if(isActive){
  ctx.fillStyle = 'rgba(100, 255, 100, 0.9)';
  ctx.fill();
 } else {
  ctx.fillStyle = 'rgba(200, 200, 200, 0.8)';
  ctx.fill();
 }
 ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
 ctx.lineWidth = 2;
 ctx.stroke();
 
 // Draw double arrow for prism apex handle
 if(isPrismApex){
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
  ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
  ctx.lineWidth = 1.5;
  
  const arrowHeight = radiusPx * 0.6;
  const arrowWidth = radiusPx * 0.3;
  
  // Up arrow
  ctx.beginPath();
  ctx.moveTo(px, py - arrowHeight);
  ctx.lineTo(px - arrowWidth, py - arrowHeight + arrowWidth * 1.5);
  ctx.lineTo(px + arrowWidth, py - arrowHeight + arrowWidth * 1.5);
  ctx.closePath();
  ctx.fill();
  
  // Down arrow
  ctx.beginPath();
  ctx.moveTo(px, py + arrowHeight);
  ctx.lineTo(px - arrowWidth, py + arrowHeight - arrowWidth * 1.5);
  ctx.lineTo(px + arrowWidth, py + arrowHeight - arrowWidth * 1.5);
  ctx.closePath();
  ctx.fill();
  
  // Vertical line connecting arrows
  ctx.beginPath();
  ctx.moveTo(px, py - arrowHeight + arrowWidth * 1.5);
  ctx.lineTo(px, py + arrowHeight - arrowWidth * 1.5);
  ctx.stroke();
 }
}

// Helper: Draw focal point handle with double arrow
function drawFocalPointHandle(fxPosPx, fyPosPx, lensXpx, lensYpx, isActive, isBeingDragged, shouldShowArrow){
 // Draw handle circle
 ctx.beginPath();
 ctx.arc(fxPosPx, fyPosPx, 8, 0, Math.PI * 2);
 if(isActive){
  ctx.fillStyle = 'rgba(100, 255, 100, 0.9)';
 } else {
  ctx.fillStyle = 'rgba(200, 200, 200, 0.8)';
 }
 ctx.fill();
 ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
 ctx.lineWidth = 2;
 ctx.stroke();
 
 if(!shouldShowArrow) return;
 
 // Draw double arrow along optical axis
 ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
 ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
 ctx.lineWidth = 1.5;
 
 const arrowLength = 8 * 0.6;
 const arrowWidth = 8 * 0.3;
 const dx = fxPosPx - lensXpx;
 const dy = fyPosPx - lensYpx;
 const dist = Math.sqrt(dx*dx + dy*dy);
 const axisX = dx / dist;
 const axisY = dy / dist;
 const perpX = -axisY;
 const perpY = axisX;
 
 // First arrow
 const tip1X = fxPosPx + axisX * arrowLength;
 const tip1Y = fyPosPx + axisY * arrowLength;
 const base1X = fxPosPx + axisX * (arrowLength - arrowWidth * 1.5);
 const base1Y = fyPosPx + axisY * (arrowLength - arrowWidth * 1.5);
 ctx.beginPath();
 ctx.moveTo(tip1X, tip1Y);
 ctx.lineTo(base1X - perpX * arrowWidth, base1Y - perpY * arrowWidth);
 ctx.lineTo(base1X + perpX * arrowWidth, base1Y + perpY * arrowWidth);
 ctx.closePath();
 ctx.fill();
 
 // Second arrow
 const tip2X = fxPosPx - axisX * arrowLength;
 const tip2Y = fyPosPx - axisY * arrowLength;
 const base2X = fxPosPx - axisX * (arrowLength - arrowWidth * 1.5);
 const base2Y = fyPosPx - axisY * (arrowLength - arrowWidth * 1.5);
 ctx.beginPath();
 ctx.moveTo(tip2X, tip2Y);
 ctx.lineTo(base2X - perpX * arrowWidth, base2Y - perpY * arrowWidth);
 ctx.lineTo(base2X + perpX * arrowWidth, base2Y + perpY * arrowWidth);
 ctx.closePath();
 ctx.fill();
 
 // Line connecting arrows
 ctx.beginPath();
 ctx.moveTo(base1X, base1Y);
 ctx.lineTo(base2X, base2Y);
 ctx.stroke();
}

function drawFocalPoints(){
 const focalColors = [
 'rgba(70,130,220,1.0)', // 1 blue
 'rgba(255,165,0,1.0)', // 2 orange
 'rgba(220,70,70,1.0)', // 3 red
 'rgba(50,160,70,1.0)', // 4 green
 'rgba(160,80,200,1.0)', // 5 purple
 'rgba(50,200,190,1.0)' // 6 teal
];
 ctx.save();
 for(let i=0;i<lenses.length;i++){
 const L=lenses[i]; if(!L.enabled) continue;
 
 // Skip focal points for planar mirrors and blocks
 if(L.isMirror && L.type === 'planar') continue;
 if(L.isBlock) continue;
 
 // For mirrors, use R/2 as focal length; for lenses, use fTarget
 const fAbs = L.isMirror ? Math.abs(L.R / 2) : Math.abs(L.fTarget || 50);
 const angleRad = (L.angle || 0) * Math.PI / 180;
 const cosAngle = Math.cos(angleRad);
 const sinAngle = Math.sin(angleRad);
 
 // Calculate focal point positions in local coordinates (along optical axis)
 const fOffsetPos = (L.type==='convex') ? fAbs : -fAbs;
 const fOffsetNeg = (L.type==='convex') ? -fAbs : fAbs;
 
 // Rotate focal point offsets around lens/mirror center
 // Optical axis is perpendicular to lens orientation
 // At angle=0 (vertical lens), optical axis is horizontal
 const fPosX = L.xcm + fOffsetPos * cosAngle;
 const fPosY = L.ycm - fOffsetPos * sinAngle;
 const fNegX = L.xcm + fOffsetNeg * cosAngle;
 const fNegY = L.ycm - fOffsetNeg * sinAngle;
 
 // For mirrors, only draw the primary focal point
 // Convex mirror: focal point behind (virtual)
 // Concave mirror: focal point in front (real)
 if(L.isMirror){
 const fxPosPx = (fPosX - viewport.offsetX) * viewport.scaleX;
 const fyPosPx = worldYtoPxY(fPosY - viewport.offsetY);
 const isBeingDragged = (interactionController.dragFocalPoint && interactionController.dragFocalLensIdx === i && interactionController.dragFocalSide === 'positive');
 const isHovered = (interactionController.hoverFocalPointIdx === i && (interactionController.hoverFocalSide === 'positive' || interactionController.hoverFocalSide === null));
 
 // Draw handle with double arrow if being dragged or hovered (or other handles of this object hovered)
 if(isBeingDragged || isHovered || (interactionController.hoverRotationIdx === i) || (interactionController.hoverStretchIdx === i) || isHandleRevealActive(i)){
  const lensXpx = (L.xcm - viewport.offsetX) * viewport.scaleX;
  const lensYpx = worldYtoPxY(L.ycm - viewport.offsetY);
  drawFocalPointHandle(fxPosPx, fyPosPx, lensXpx, lensYpx, isBeingDragged, isBeingDragged, true);
 }
 ctx.fillStyle = focalColors[i];
 ctx.beginPath();
 ctx.arc(fxPosPx, fyPosPx, 3, 0, Math.PI*2);
 ctx.fill();
 } else {
 // For lenses, draw both focal points
 // Draw focal point on positive side
 const fxPosPx = (fPosX - viewport.offsetX) * viewport.scaleX;
 const fyPosPx = worldYtoPxY(fPosY - viewport.offsetY);
 const isPosBeingDragged = (interactionController.dragFocalPoint && interactionController.dragFocalLensIdx === i && interactionController.dragFocalSide === 'positive');
 const isPosHovered = (interactionController.hoverFocalPointIdx === i && (interactionController.hoverFocalSide === 'positive' || interactionController.hoverFocalSide === null));
 
 // Draw handle with double arrow if being dragged or hovered (or other handles of this object hovered)
 if(isPosBeingDragged || isPosHovered || (interactionController.hoverRotationIdx === i) || (interactionController.hoverStretchIdx === i)){
  const lensXpx = (L.xcm - viewport.offsetX) * viewport.scaleX;
  const lensYpx = worldYtoPxY(L.ycm - viewport.offsetY);
  drawFocalPointHandle(fxPosPx, fyPosPx, lensXpx, lensYpx, isPosBeingDragged, isPosBeingDragged, true);
 }
 ctx.fillStyle = focalColors[i];
 ctx.beginPath();
 ctx.arc(fxPosPx, fyPosPx, 3, 0, Math.PI*2);
 ctx.fill();
 // Draw focal point on negative side
 const fxNegPx = (fNegX - viewport.offsetX) * viewport.scaleX;
 const fyNegPx = worldYtoPxY(fNegY - viewport.offsetY);
 const isNegBeingDragged = (interactionController.dragFocalPoint && interactionController.dragFocalLensIdx === i && interactionController.dragFocalSide === 'negative');
 const isNegHovered = (interactionController.hoverFocalPointIdx === i && (interactionController.hoverFocalSide === 'negative' || interactionController.hoverFocalSide === null));
 
 // Draw handle with double arrow if being dragged or hovered (or other handles of this object hovered)
 if(isNegBeingDragged || isNegHovered || (interactionController.hoverRotationIdx === i) || (interactionController.hoverStretchIdx === i)){
  const lensXpx = (L.xcm - viewport.offsetX) * viewport.scaleX;
  const lensYpx = worldYtoPxY(L.ycm - viewport.offsetY);
  drawFocalPointHandle(fxNegPx, fyNegPx, lensXpx, lensYpx, isNegBeingDragged, isNegBeingDragged, true);
 }
 ctx.fillStyle = focalColors[i];
 ctx.beginPath();
 ctx.arc(fxNegPx, fyNegPx, 3, 0, Math.PI*2);
 ctx.fill();
 }
 }
 ctx.restore();
}
function getRayDefinitions(){
 const waveType = getWaveType();
 const waveWidthCm = parseFloat(waveWidthSlider.value);
 const targetLens = getPrimaryTargetLens();
 const lensX = targetLens.xcm;
 const rays=[];
 
 // In Rainbow preset, scale rays with width (max 15 rays at 10cm width, min 3 at 0cm)
 // Beyond 10cm width, rays spread further apart rather than adding more
 // RGB mode uses 3 rays like other presets
 const numRays = (currentPreset === 'rainbow' && !whiteLight) 
   ? Math.max(3, Math.min(15, Math.round(3 + waveWidthCm * 1.2)))
   : 3;
 
 if(waveType === 'plane'){
 let angle;
 if(manualDirectionMode){
  angle = manualDirectionAngle;
 } else {
  const lensCenterY = targetLens.ycm;
  const dx = lensX - planeWaveXcm;
  const dy = lensCenterY - planeWaveYcm;
  angle = Math.atan2(dy, dx);
 }
 const vx = Math.cos(angle);
 const vy = Math.sin(angle);
 const perpX = -Math.sin(angle);
 const perpY = Math.cos(angle);
 
 // Generate offsets evenly spaced across the range
 const offsets = [];
 if(numRays === 1) {
  offsets.push(0);
 } else {
  for(let i = 0; i < numRays; i++) {
   const t = i / (numRays - 1); // 0 to 1
   const off = (t - 0.5) * 2 * waveWidthCm / 3; // Range from -waveWidthCm/3 to +waveWidthCm/3
   offsets.push(off);
  }
 }
 
 for(const off of offsets){
 const xcm = planeWaveXcm + perpX * off;
 const ycm = planeWaveYcm + perpY * off;
 const insideLensId = detectCurrentLens(xcm, ycm);
 // Create new velocity for each ray to avoid sharing references
 rays.push({xcm, ycm, vx: vx, vy: vy, insideLensId});
 }
 } else {
 // Point source
 let targetHeight;
 if (userOverrideWaveWidth) {
   // Convert waveWidth (0-50) to angular spread (0-120°), then to linear extent at lens distance
   const desiredSpreadAngle = (waveWidthCm / 50) * (Math.PI * 2 / 3);
   const dx = lensX - pointSourceXcm;
   targetHeight = 2 * Math.abs(dx) * Math.tan(desiredSpreadAngle / 2);
 } else {
   targetHeight = targetLens.H * 0.9;
 }
 
 // Generate offsets evenly spaced across the range
 const offsets = [];
 if(numRays === 1) {
  offsets.push(0);
 } else {
  const rangeSize = manualDirectionMode ? (waveWidthCm / 3) : (targetHeight / 3);
  for(let i = 0; i < numRays; i++) {
   const t = i / (numRays - 1); // 0 to 1
   const off = (t - 0.5) * 2 * rangeSize; // Range from -rangeSize to +rangeSize
   offsets.push(off);
  }
 }
 
 const pointSourceInsideLensId = detectCurrentLens(pointSourceXcm, pointSourceYcm);
 for(const off of offsets){
 let angle;
 if(manualDirectionMode){
  // Manual mode: spread rays based on waveWidth
  // Map waveWidth (0-50cm) to angular spread (0-120 degrees) to match auto-target behavior
  const spreadAngle = (waveWidthCm / 50) * (Math.PI * 2 / 3);
  // Avoid division by zero when waveWidth is 0
  const angleOffset = (waveWidthCm > 0) ? (off / (waveWidthCm/3)) * spreadAngle / 2 : 0;
  angle = manualDirectionAngle + angleOffset;
 } else {
  const targetY = targetLens.ycm + off;
  angle = Math.atan2(targetY - pointSourceYcm, lensX - pointSourceXcm);
 }
 const vx = Math.cos(angle);
 const vy = Math.sin(angle);
 // Create new velocity for each ray
 rays.push({xcm:pointSourceXcm, ycm:pointSourceYcm, vx: vx, vy: vy, insideLensId: pointSourceInsideLensId});
 }
 }

/**

 * Returns the intersection {xcm, ycm} or null.

 const dx = p3.xcm - p1.xcm, dy = p3.ycm - p1.ycm;
 const t = (dx * d2y - dy * d2x) / denom;
 const u = (dx * d1y - dy * d1x) / denom;

  return { xcm: p1.xcm + t * d1x, ycm: p1.ycm + t * d1y };

}

/**
 * Line intersection for infinite lines (not segment-bounded).
 * Returns {xcm, ycm} or null if parallel.

function lineIntersectionInfinite(p1, p2, p3, p4) {

 const denom = d1x * d2y - d1y * d2x;
 if (Math.abs(denom) < 1e-12) return null;
 const dx = p3.xcm - p1.xcm, dy = p3.ycm - p1.ycm;

 const dStart = Math.hypot(a0.xcm - b0.xcm, a0.ycm - b0.ycm);

 * Returns a map { [lensIndex]: {xcm, ycm} }.
 */
function findImagePointsForSource(srcXcm, srcYcm) {
 const tracedSegments = traceRaysFromSource(srcXcm, srcYcm);

 // Collect enabled optical elements sorted by x-position
 const elements = [];
 for (let li = 0; li < lensCache.length; li++) {
  const c = lensCache[li];
  if (c && c.L.enabled) {
   const isMirror = !!c.L.isMirror;
   const halfWidth = (c.L.H || 10) * 0.12;
   elements.push({ li, xcm: c.L.xcm, farEdge: c.L.xcm + Math.max(halfWidth, 2), isMirror, element: c });
  }
 }
 elements.sort((a, b) => a.xcm - b.xcm);

 const hitsPerElement = {};
 for (const el of elements) {
  const realHits = [];
  const virtualHits = [];
  const virtualRayStarts = {};
  const virtualRayDirs = {};
  
  for (let i = 0; i < tracedSegments.length; i++) {
   for (let j = i + 1; j < tracedSegments.length; j++) {
    const segI = tracedSegments[i];
    const segJ = tracedSegments[j];
    const ptsI = segI.points || [];
    const ptsJ = segJ.points || [];
    
    // Check if both rays interacted with this element
    // For mirrors: check interactedMirrors set
    // For lenses: check lensRefractions array for refraction events
    let iInteracted, jInteracted;
    
    if (el.isMirror) {
     iInteracted = ptsI.length > 0 && segI.interactedMirrors?.includes(el.li);
     jInteracted = ptsJ.length > 0 && segJ.interactedMirrors?.includes(el.li);
    } else {
     // For lenses: check if a refraction event occurred for this lens
     iInteracted = (segI.lensRefractions || []).some(r => r.lensIndex === el.li);
     jInteracted = (segJ.lensRefractions || []).some(r => r.lensIndex === el.li);
    }
    
    if (!iInteracted || !jInteracted) continue;
    
    // For both mirrors and lenses, use direct reflection/refraction data
    let segA, segB;
    let rayDirectionA, rayDirectionB;
    let rayStartA, rayStartB;
    const rayExtendCm = 200;
    
    if (el.isMirror) {
     // Use mirrorReflections directly for exact reflection data
     const reflI = (segI.mirrorReflections || []).find(r => r.mirrorIndex === el.li);
     const reflJ = (segJ.mirrorReflections || []).find(r => r.mirrorIndex === el.li);
     
    if (!reflI || !reflJ) {
     continue;
    }
     
    // Create synthetic segments from reflection data
    // Extend in the reflected direction for image calculations
     rayStartA = { xcm: reflI.xcm, ycm: reflI.ycm };
     rayDirectionA = { vx: reflI.reflectedVx, vy: reflI.reflectedVy };
     segA = [
      rayStartA,
     { xcm: reflI.xcm + reflI.reflectedVx * rayExtendCm, ycm: reflI.ycm + reflI.reflectedVy * rayExtendCm }
     ];
     
     rayStartB = { xcm: reflJ.xcm, ycm: reflJ.ycm };
     rayDirectionB = { vx: reflJ.reflectedVx, vy: reflJ.reflectedVy };
     segB = [
      rayStartB,
     { xcm: reflJ.xcm + reflJ.reflectedVx * rayExtendCm, ycm: reflJ.ycm + reflJ.reflectedVy * rayExtendCm }
     ];
    } else {
     // Use lensRefractions directly for exact refraction data
    const refractionsI = (segI.lensRefractions || []).filter(r => r.lensIndex === el.li);
    const refractionsJ = (segJ.lensRefractions || []).filter(r => r.lensIndex === el.li);
    const refrI = refractionsI.find(r => r.leaving) || refractionsI[refractionsI.length - 1];
    const refrJ = refractionsJ.find(r => r.leaving) || refractionsJ[refractionsJ.length - 1];
     
    if (!refrI || !refrJ) {
     continue;
    }
     
    // Create synthetic segments from refraction data
    // Extend in the refracted direction for image calculations
     rayStartA = { xcm: refrI.xcm, ycm: refrI.ycm };
     rayDirectionA = { vx: refrI.refractedVx, vy: refrI.refractedVy };
     segA = [
      rayStartA,
     { xcm: refrI.xcm + refrI.refractedVx * rayExtendCm, ycm: refrI.ycm + refrI.refractedVy * rayExtendCm }
     ];
     
     rayStartB = { xcm: refrJ.xcm, ycm: refrJ.ycm };
     rayDirectionB = { vx: refrJ.refractedVx, vy: refrJ.refractedVy };
     segB = [
      rayStartB,
     { xcm: refrJ.xcm + refrJ.refractedVx * rayExtendCm, ycm: refrJ.ycm + refrJ.refractedVy * rayExtendCm }
     ];
    }
    
    if (!segA || !segB) {
     continue;
    }
    
    const hit = findFirstCrossing(segA, segB);
    if (hit) {
     // Check if hit is reachable on both rays before they interact with next optical element
     const hitValidA = isHitReachableOnRay(hit, rayStartA, rayDirectionA, el, segI);
     const hitValidB = isHitReachableOnRay(hit, rayStartB, rayDirectionB, el, segJ);
     if (hitValidA && hitValidB) {
      realHits.push(hit);
     }
    } else if (areRaysDiverging(segA, segB)) {
     const pA0 = segA[0], pA1 = segA[1];
     const pB0 = segB[0], pB1 = segB[1];
     const vHit = lineIntersectionInfinite(pA0, pA1, pB0, pB1);
     if (vHit && isBehindRay(pA0, pA1, vHit) && isBehindRay(pB0, pB1, vHit)) {
      virtualHits.push(vHit);
     }
     if (!virtualRayStarts[i]) {
      virtualRayStarts[i] = pA0;
      virtualRayDirs[i] = { vx: pA1.xcm - pA0.xcm, vy: pA1.ycm - pA0.ycm };
     }
     if (!virtualRayStarts[j]) {
      virtualRayStarts[j] = pB0;
      virtualRayDirs[j] = { vx: pB1.xcm - pB0.xcm, vy: pB1.ycm - pB0.ycm };
     }
    }
   }
  }
  
  if (realHits.length > 0) {
   const avgX = realHits.reduce((s, h) => s + h.xcm, 0) / realHits.length;
   const avgY = realHits.reduce((s, h) => s + h.ycm, 0) / realHits.length;
   hitsPerElement[el.li] = { xcm: avgX, ycm: avgY, isVirtual: false, backRays: [] };
  } else if (virtualHits.length > 0) {
   const avgX = virtualHits.reduce((s, h) => s + h.xcm, 0) / virtualHits.length;
   const avgY = virtualHits.reduce((s, h) => s + h.ycm, 0) / virtualHits.length;
   const backRays = [];
   for (const key of Object.keys(virtualRayStarts)) {
    const start = virtualRayStarts[key];
    const dir = virtualRayDirs[key];
    const denom = (dir.vx * dir.vx + dir.vy * dir.vy) || 1e-9;
    const t = ((avgX - start.xcm) * dir.vx + (avgY - start.ycm) * dir.vy) / denom;
    const end = { xcm: start.xcm + dir.vx * t, ycm: start.ycm + dir.vy * t };
    backRays.push({ start, end });
   }
   hitsPerElement[el.li] = { xcm: avgX, ycm: avgY, isVirtual: true, backRays };
  }
 }
 return hitsPerElement;
}

/**
 * Find formed images.
 * In simplified mode: returns [{xcm, ycm}] where rays from head converge.
 * In full mode: returns [{headPt, feetPt}] with both head and feet convergence.
 */
function findRayImagePoints() {
 if (!showObjectsImages) return [];
 if (!showRays) return [];
 rebuildLensCache();
 if (getRayDefinitions().length < 2) return [];

 if (simplifiedImages) {
  const src = getActiveSource();
  const headImages = findImagePointsForSource(src.xcm, src.ycm);
  return Object.values(headImages); // Returns [{xcm, ycm, isVirtual, backRays}, ...]
 }

 // Full mode: find convergence from both head and feet
 const src = getActiveSource();
 const headImages = findImagePointsForSource(src.xcm, src.ycm);
 const feetImages = findImagePointsForSource(src.xcm, originYcm);

 const results = [];
 // Only emit an image when we have convergence for both head and feet
 for (const li of Object.keys(headImages)) {
  if (!feetImages[li]) continue;
  const isVirtual = !!(headImages[li].isVirtual || feetImages[li].isVirtual);
  const backRays = headImages[li].backRays || [];
  results.push({ headPt: headImages[li], feetPt: feetImages[li], isVirtual, backRays });
 }
 return results;
}

function drawVirtualBackRays(backRays) {
 if (!backRays || backRays.length === 0) return;
 ctx.save();
 ctx.strokeStyle = invertColors ? 'rgba(255,255,255,0.5)' : 'rgba(80,80,80,0.6)';
 ctx.lineWidth = 1.1;
 ctx.setLineDash([6, 6]);
 for (const ray of backRays) {
  const x0 = (ray.start.xcm - viewport.offsetX) * viewport.scaleX;
  const y0 = worldYtoPxY(ray.start.ycm - viewport.offsetY);
  const x1 = (ray.end.xcm - viewport.offsetX) * viewport.scaleX;
  const y1 = worldYtoPxY(ray.end.ycm - viewport.offsetY);
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.stroke();
 }
 ctx.restore();
}

/**
 * Draw a stick figure whose feet are at feetPt and head tip at headPt
 * (both {xcm, ycm} world coordinates). The figure is oriented along the
 * spine vector so it is correct for any image position, tilt or scale.
 */
function drawStickManAt(headPt, feetPt) {
 // World → screen helpers
 function spx(xcm) { return (xcm - viewport.offsetX) * viewport.scaleX; }
 function spy(ycm) { return viewport.worldYtoPxY(ycm); }

 // Screen positions of tip and feet
 const tipX = spx(headPt.xcm), tipY = spy(headPt.ycm);
 const feetX = spx(feetPt.xcm), feetY = spy(feetPt.ycm);

 const spineLen = Math.hypot(tipX - feetX, tipY - feetY);
 if (spineLen < 4) return; // too small to draw

 // Unit vectors along spine (feet→tip) and perpendicular
 const sx = (tipX - feetX) / spineLen;
 const sy = (tipY - feetY) / spineLen;
 const px = -sy; // perpendicular (rotated 90° CCW)
 const py =  sx;

 // Helper: point = feetPx + tSpine*(spine) + tPerp*(spineLen*perp)
 function pt(tSpine, tPerp) {
  return [
   feetX + tSpine * (tipX - feetX) + tPerp * spineLen * px,
   feetY + tSpine * (tipY - feetY) + tPerp * spineLen * py
  ];
 }

 // Proportions (same as original drawStickMan)
 const headR  = 0.14;          // fraction of spineLen
 const headR_px = spineLen * headR;

 // Key t-values along spine (0 = feet, 1 = head tip)
 const tHeadCentre = 1 - headR;          // 0.86
 const tNeck       = 1 - headR * 2.3;    // 0.678
 const tShoulder   = 1 - headR * 3.0;    // 0.58
 const tHip        = 0.42;
 const tHand       = 1 - headR * 4.2;    // 0.412
 const tFeet       = 0;
 const armW  = headR * 1.8;   // tPerp offset for hands
 const footW = headR * 1.1;   // tPerp offset for feet

 const [hcX, hcY]   = pt(tHeadCentre, 0);
 const [nkX, nkY]   = pt(tNeck, 0);
 const [shX, shY]   = pt(tShoulder, 0);
 const [hipX, hipY] = pt(tHip, 0);
 const [ftX, ftY]   = pt(tFeet, 0);
 const [hlX, hlY]   = pt(tHand, -armW);
 const [hrX, hrY]   = pt(tHand,  armW);
 const [flX, flY]   = pt(tFeet, -footW);
 const [frX, frY]   = pt(tFeet,  footW);

 ctx.save();
 ctx.strokeStyle = invertColors ? 'rgba(255,200,100,0.85)' : 'rgba(160,40,0,0.85)';
 ctx.lineWidth   = Math.max(1, headR_px * 0.20);
 ctx.lineCap     = 'round';
 ctx.lineJoin    = 'round';

 // Head
 ctx.beginPath(); ctx.arc(hcX, hcY, headR_px, 0, Math.PI * 2); ctx.stroke();
 // Body
 ctx.beginPath(); ctx.moveTo(nkX, nkY); ctx.lineTo(hipX, hipY); ctx.stroke();
 // Arms
 ctx.beginPath(); ctx.moveTo(hlX, hlY); ctx.lineTo(shX, shY); ctx.lineTo(hrX, hrY); ctx.stroke();
 // Legs
 ctx.beginPath(); ctx.moveTo(flX, flY); ctx.lineTo(hipX, hipY); ctx.lineTo(frX, frY); ctx.stroke();
 ctx.restore();
}

/**
 * Draw a cell at the image position with top at headPt and center at feetPt
 * (both {xcm, ycm} world coordinates).
 */
function drawCellAt(headPt, feetPt) {
 // Calculate dimensions
 const radiusCm = Math.abs(headPt.ycm - feetPt.ycm);
 if (radiusCm < 0.5) return; // too small to draw
 
 // Center of cell is at feetPt
 const centerXcm = feetPt.xcm;
 const centerYcm = feetPt.ycm;
 
 // Convert to screen coordinates
 const xPx = (centerXcm - viewport.offsetX) * viewport.scaleX;
 const yPx = viewport.worldYtoPxY(centerYcm);
 const radiusPx = radiusCm * viewport.scaleX;
 
 drawAnimalCell(xPx, yPx, radiusPx, 0.30);
}

// Draw formed Jupiter image at convergence points (reduced opacity, like cell)
function drawJupiterAt(headPt, feetPt) {
  const radiusCm = Math.abs(headPt.ycm - feetPt.ycm);
  if (radiusCm < 0.5) return;
  const centerXcm = feetPt.xcm;
  const centerYcm = feetPt.ycm;
  const xPx = (centerXcm - viewport.offsetX) * viewport.scaleX;
  const yPx = viewport.worldYtoPxY(centerYcm);
  const radiusPx = radiusCm * viewport.scaleX;
  drawJupiterImage(xPx, yPx, radiusPx, 0.30);
}

/**
 * Check if all enabled optical components are on the optical axis.
 * Returns true if all enabled components have ycm = originYcm (the optical axis).
 */
function allEnabledComponentsOnAxis() {
 for (let i = 0; i < lenses.length; i++) {
  if (lenses[i].enabled && Math.abs(lenses[i].ycm - originYcm) > 0.01) {
   return false; // Found an off-axis component
  }
 }
 return true; // All enabled components are on-axis (or none are enabled)
}

/**
 * Draw formed images.
 * In simplified mode: each image is drawn vertically with head at convergence point.
 * In full mode: each image uses the full spine vector between head and feet convergence.
 */
function drawFormedImages() {
 if (!showObjectsImages) return;
 const isCompoundMicroscope = (currentPreset === 'compoundMicroscope');
 const images = findRayImagePoints();
 
 if (simplifiedImages) {
  if (!allEnabledComponentsOnAxis()) return;
 }
 
 if (simplifiedImages) {
  // Simplified mode: images is [{xcm, ycm}, ...]
  for (const img of images) {
  if (img.isVirtual) drawVirtualBackRays(img.backRays);
   const headPt = { xcm: img.xcm, ycm: img.ycm };
   const feetPt = { xcm: img.xcm, ycm: originYcm };
   if (isCompoundMicroscope) {
    drawCellAt(headPt, feetPt);
   } else if (getWaveType() === 'plane') {
    drawJupiterAt(headPt, feetPt);
   } else {
    drawStickManAt(headPt, feetPt);
   }
  }
 } else {
  // Full mode: images is [{headPt, feetPt}, ...]
  for (const img of images) {
  if (img.isVirtual) drawVirtualBackRays(img.backRays);
   if (isCompoundMicroscope) {
    drawCellAt(img.headPt, img.feetPt);
   } else if (getWaveType() === 'plane') {
    drawJupiterAt(img.headPt, img.feetPt);
   } else {
    drawStickManAt(img.headPt, img.feetPt);
   }
  }
 }
}

function drawCellObject() {
 // Draw cell at active source (point or plane depending on mode)
 // Top of cell at source, center on optical axis
 const { xcm: x, ycm: yTop } = getActiveSource();
 const yCenter = originYcm;
 const radiusCm = Math.abs(yTop - yCenter);
 if(radiusCm < 0.5) return; // too small to draw
 
 // Convert to screen coordinates
 const xPx = (x - viewport.offsetX) * viewport.scaleX;
 const yPx = viewport.worldYtoPxY(yCenter);
 const radiusPx = radiusCm * viewport.scaleX;
 
 drawAnimalCell(xPx, yPx, radiusPx, 1.0);
}


// Draw Jupiter as the object (used when plane wave is active)
function drawJupiterObject() {
  if(!showObjectsImages) return;
  const { xcm: x, ycm: yTop } = getActiveSource();
  const yCenter = originYcm;
  const radiusCm = Math.abs(yTop - yCenter);
  if (radiusCm < 0.5) return;
  const xPx = (x - viewport.offsetX) * viewport.scaleX;
  const yPx = viewport.worldYtoPxY(yCenter);
  const radiusPx = radiusCm * viewport.scaleX;
  drawJupiterImage(xPx, yPx, radiusPx, 1.0);
}

function drawStickMan() {
 if(!showObjectsImages) return;
 // For compound microscope, draw cell instead of stickman
 const isCompoundMicroscope = (currentPreset === 'compoundMicroscope');
 if (isCompoundMicroscope) {
  drawCellObject();
  return;
 }

 // If active source is plane wave, draw Jupiter instead of stickman
 if (getWaveType() === 'plane') {
  drawJupiterObject();
  return;
 }

 const { xcm: x, ycm: yTop } = getActiveSource();   // top of head in world coords
 const yFeet = originYcm;        // feet on optical axis
 const h = yTop - yFeet;
 if(Math.abs(h) < 0.5) return;   // too small to draw

 // Helper: world → screen
 function sx(xcm) { return (xcm - viewport.offsetX) * viewport.scaleX; }
 function sy(ycm) { return viewport.worldYtoPxY(ycm); }

 // Proportions relative to total height h
 const sign = h > 0 ? 1 : -1;   // +1 upright, -1 inverted
 const headR_cm  = Math.abs(h) * 0.14;
 const headCX    = sx(x);
 const headCY    = sy(yTop - sign * headR_cm);         // head centre
 const headR_px  = headR_cm * viewport.scaleY;
 const neckY     = sy(yTop - sign * headR_cm * 2.3);
 const shouldY   = sy(yTop - sign * headR_cm * 3.0);
 const hipY      = sy(yFeet + sign * Math.abs(h) * 0.42);
 const feetY     = sy(yFeet);
 const bodyX     = sx(x);
 const armSpread = headR_cm * 1.8;
 const handX_L   = sx(x - armSpread);
 const handX_R   = sx(x + armSpread);
 const handY     = sy(yTop - sign * headR_cm * 4.2);
 const footSpread = headR_cm * 1.1;
 const footX_L   = sx(x - footSpread);
 const footX_R   = sx(x + footSpread);

 ctx.save();
 ctx.strokeStyle = invertColors ? 'rgba(255,255,255,0.85)' : 'rgba(30,30,30,0.85)';
 ctx.lineWidth   = Math.max(1, headR_px * 0.20);
 ctx.lineCap     = 'round';
 ctx.lineJoin    = 'round';

 // Head
 ctx.beginPath();
 ctx.arc(headCX, headCY, headR_px, 0, Math.PI * 2);
 ctx.stroke();

 // Body
 ctx.beginPath();
 ctx.moveTo(bodyX, neckY);
 ctx.lineTo(bodyX, hipY);
 ctx.stroke();

 // Arms
 ctx.beginPath();
 ctx.moveTo(handX_L, handY);
 ctx.lineTo(bodyX, shouldY);
 ctx.lineTo(handX_R, handY);
 ctx.stroke();

 // Legs
 ctx.beginPath();
 ctx.moveTo(footX_L, feetY);
 ctx.lineTo(bodyX, hipY);
 ctx.lineTo(footX_R, feetY);
 ctx.stroke();

 ctx.restore();
}

function loop(now){
 updatePlaneWaveMinX();
 // Only update particle physics when not paused
 if(!isPaused) {
  const wavelength=parseFloat(wavelengthSlider.value);
  const baseSpeed=40*parseFloat(speedScaleSlider.value)*0.75;
  const spawnInterval=wavelength/Math.max(baseSpeed,1e-3);
  if(((now-lastSpawn)/1000)>spawnInterval || particleSystem.count===0){ spawnWavefront(); lastSpawn=now; }
  const dt=(now-lastFrame)/1000; lastFrame=now;
  const MAX_CATCHUP=0.25; let acc=dt; if(acc>MAX_CATCHUP) acc=MAX_CATCHUP;
  while(acc>=fixedStep){ physicsStep(fixedStep); acc-=fixedStep; }
  if(++particleCompactCounter>=600){ compactParticles(); particleCompactCounter=0; }
 }
 
 // Always update and draw everything (so rays and UI remain responsive)
 syncLensEnabled();
 if(lensIsDirty) rebuildLensCache();
 ctx.clearRect(0,0,canvas.width,canvas.height);
 // Fill background first so subsequent layers can sit above it (axis/rays/lenses on top)
 const bg = invertColors ? '#000' : '#fff';
 ctx.fillStyle = bg;
 ctx.fillRect(0,0,canvas.width,canvas.height);
 // Draw virtual images behind axis, rays, and lenses
 // Skip for presets: they use Objects and Images feature instead
 const isTelescopeOrMicroscopePreset = (currentPreset === 'galilean' || currentPreset === 'astronomical' || currentPreset === 'compoundMicroscope');
 if(!isTelescopeOrMicroscopePreset) drawVirtualRayIntersection();
 if(!isTelescopeOrMicroscopePreset) drawJupiter();
 // Grid (axis and ticks) above images
 drawGrid();
 drawStickMan();
 drawFormedImages();
 // Draw lenses first, then rays on top
 drawLenses();
 drawFocalPoints();
 drawRays();
 // Skip virtual rays for presets - they show Objects and Images instead
 if(!isTelescopeOrMicroscopePreset) drawVirtualRays();
 drawParticles();
 drawPointSource();
 drawDirectionArrow();
 drawDirectionRotationHandle();
  drawSourceDragHandle();
 
 requestAnimationFrame(loop);
}
// Button event listeners
function setupButtonListeners() {
  // Wave menu toggle
  const waveMenuToggle = document.getElementById('wave-menu-toggle');
  const controlsWave = document.getElementById('controls-wave');
  const waveMenuCollapse = document.getElementById('wave-menu-collapse');
  
  waveMenuToggle.addEventListener('click', () => {
    controlsWave.classList.toggle('hidden');
    waveMenuToggle.classList.toggle('menu-open');
  });
  
  waveMenuCollapse.addEventListener('click', () => {
    controlsWave.classList.add('hidden');
    waveMenuToggle.classList.remove('menu-open');
  });
  
  // Component menu toggle
  const componentMenuToggle = document.getElementById('component-menu-toggle');
  const controlsBottom = document.getElementById('controls-bottom');
  const componentMenuCollapse = document.getElementById('component-menu-collapse');
  
  componentMenuToggle.addEventListener('click', () => {
    controlsBottom.classList.toggle('hidden');
    componentMenuToggle.classList.toggle('menu-open');
  });
  
  componentMenuCollapse.addEventListener('click', () => {
    controlsBottom.classList.add('hidden');
    componentMenuToggle.classList.remove('menu-open');
  });
  
  document.getElementById('playPauseBtn').addEventListener('click', ()=>{
    isPaused = !isPaused;
    document.getElementById('playPauseBtn').textContent = isPaused ? 'Play' : 'Pause';
  });
  
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    particleSystem.clear();
    manualDirectionMode = false; // Reset to auto-target mode
    userOverrideWaveWidth = false; // Reset width override
    if(currentPreset) {
      applyPreset(currentPreset);
      document.getElementById('presetSelect').value = currentPreset;
    } else {
      viewport.setPan(-3, 0);
      viewport.setZoom(1.0);
      recalcScaleAndRange();
      buildGrid();
      for(let i=0; i<hasBeenPositioned.length; i++){
 hasBeenPositioned[i] = lenses[i].enabled;
 }
 }
 lastSpawn = performance.now();
 spawnWavefront();
 // Keep the current pause state - don't automatically resume
  });
  
  document.getElementById('presetSelect').addEventListener('change', (e)=>{
    if(e.target.value) {
      applyPreset(e.target.value);
    }
  });
}

function init(){
  resizeCanvasToFit();
  updateWaveReadouts();
  rebuildLensCache();
  setupButtonListeners();
  applyPreset('singleLens'); // Start with Single Lens preset
  document.getElementById('presetSelect').value = 'singleLens';
  spawnWavefront();
  requestAnimationFrame(loop);
}

         lenses[i].angle = config.angle !== undefined ? config.angle : 0;
         
         // For blocks (indices 6-8), set all block properties
         if(i >= 6 && i <= 8) {
             lenses[i].blockType = config.blockType || config.type;
             lenses[i].scale = config.scale !== undefined ? config.scale : config.H;
             if(config.width !== undefined) lenses[i].width = config.width;
             if(config.vertexAngle !== undefined) lenses[i].vertexAngle = config.vertexAngle;
             if(config.curvedShape) {
                 lenses[i].curvedShape = config.curvedShape;
             }
         }
     } else {
         // Keep current settings, just disable
         lenses[i].enabled = false;
     }
     
     // Calculate R based on element type
     if(i >= 3 && i <= 5) {
         // Mirrors: use f = R/2, so R = 2*f
         if(lenses[i].type === 'planar'){
             lenses[i].R = Infinity;
         } else {
             lenses[i].R = 2 * lenses[i].fTarget;
         }
     } else {
         // Lenses: use thick lens formula
         lenses[i].R = Math.max(rho_from_f_thick(lenses[i].type, lenses[i].n, lenses[i].fTarget, lenses[i].H), rho_from_A(lenses[i].H, safeAlo(lenses[i].H)));
     }
     
     // Update checkbox states
     lensEnabledCheckboxes[i].checked = lenses[i].enabled;
 }
 for(let i=0; i<9; i++){
     if(lenses[i].enabled) purgeParticlesPastLens(i);
     // Restore type flags
     if(i>=3 && i<=5) lenses[i].isMirror = true;
     if(i>=6 && i<=8) lenses[i].isBlock = true;
 }
 
 // Mark preset components as positioned to prevent auto-repositioning
 for(let i=0; i<9; i++){
 if(i < presetConfig.length && presetConfig[i]){
 hasBeenPositioned[i] = true;
 } else {
 hasBeenPositioned[i] = false;
 }
 }
 
 rebuildCards();
 invalidateLensCache();
 // --- Improved zoom logic: zoom to show exactly maxHeight (or constrained by minWidth) ---
 const baseScale = canvas.height / cmHeight;
 // The zoom level needed to fit maxHeight (vertical constraint)
 let zoomByHeight = maxHeight ? (canvas.height / maxHeight) / baseScale : 1.0;
 // The zoom level needed to fit minWidth (horizontal constraint)
 let zoomByWidth = minWidth ? (canvas.width / minWidth) / baseScale : 1.0;
 // Use the minimum of the two (most restrictive) to ensure both constraints are satisfied
 viewport.setZoom(Math.min(zoomByHeight, zoomByWidth));
 recalcScaleAndRange();

 // Set viewport center from preset if available (but only if explicit offsets not provided)
 if(presetObj.offsetX === undefined && presetObj.offsetY === undefined) {
     if(presetObj.centerX !== undefined && presetObj.centerY !== undefined) {
         // Calculate offsets to center the view on the saved center point
         const targetOffsetY = presetObj.centerY;
         let targetOffsetX = presetObj.centerX - viewport.worldWidth / 2;
         // Don't allow more negative x values than default (-3)
         targetOffsetX = Math.max(-3, targetOffsetX);
         viewport.setPan(targetOffsetX, targetOffsetY);
         recalcScaleAndRange();
     }
 }

 // Apply wave and display settings from preset
 if(presetObj.waveSettings) {
     const ws = presetObj.waveSettings;
     // Handle dynamic values (strings that reference originYcm)
     pointSourceXcm = (ws.pointSourceXcm !== undefined) ? ws.pointSourceXcm : 0; // Default to 0 for backward compatibility
     pointSourceYcm = typeof ws.pointSourceYcm === 'string' ? eval(ws.pointSourceYcm) : ws.pointSourceYcm;
     planeWaveXcm = (ws.planeWaveXcm !== undefined) ? ws.planeWaveXcm : 0; // Default to 0 for backward compatibility
     planeWaveYcm = typeof ws.planeWaveYcm === 'string' ? eval(ws.planeWaveYcm) : ws.planeWaveYcm;
     waveWidthSlider.value = ws.waveWidth;
     if(ws.wavelength) wavelengthSlider.value = ws.wavelength;
     document.querySelector(`input[name="waveType"][value="${ws.waveType}"]`).checked = true;
     // Handle manual direction mode
     if(ws.manualDirectionMode !== undefined) {
         manualDirectionMode = ws.manualDirectionMode;
     }
     if(ws.manualDirectionAngle !== undefined) {
         manualDirectionAngle = ws.manualDirectionAngle;
     }
     updateWaveReadouts();
    clampPlaneWaveForObjects();
 }
 if(presetObj.displaySettings) {
     const ds = presetObj.displaySettings;
     invertColors = ds.invertColors; invertColorsToggle.checked = ds.invertColors;
     whiteLight = ds.whiteLight; whiteLightToggle.checked = ds.whiteLight;
     whiteLightSpectrum = ds.whiteLightSpectrum || false; whiteLightSpectrumToggle.checked = ds.whiteLightSpectrum || false;
     showRays = ds.showRays; rayToggle.checked = ds.showRays;
     showNormals = ds.showNormals || false; normalsToggle.checked = ds.showNormals || false;
     showWavefronts = ds.showWavefronts; wavefrontToggle.checked = ds.showWavefronts;
     allowTIR = ds.allowTIR; tirToggle.checked = ds.allowTIR;
     partialReflections = ds.partialReflections || false; partialReflectionsToggle.checked = ds.partialReflections || false;
     partialReflectionsGroup.style.display = allowTIR ? 'flex' : 'none';
     showObjectsImages = ds.showObjectsImages || false; objectsImagesToggle.checked = ds.showObjectsImages || false;
     simplifiedImages = ds.simplifiedImages !== undefined ? ds.simplifiedImages : true; simplifiedImagesToggle.checked = simplifiedImages;
     simplifiedImagesGroup.style.display = showObjectsImages ? 'flex' : 'none';
    clampPlaneWaveForObjects();
 }
 
 // For telescope/microscope presets, enable Objects and Images by default
 const isTelescopePreset = (currentPreset === 'galilean' || currentPreset === 'astronomical');
 const isMicroscopePreset = (currentPreset === 'compoundMicroscope');
 if (isTelescopePreset || isMicroscopePreset) {
     showObjectsImages = true;
     objectsImagesToggle.checked = true;
     simplifiedImagesGroup.style.display = 'flex';
 }
 if(presetObj.speedScale) {
     speedScaleSlider.value = presetObj.speedScale;
     speedOut.textContent = presetObj.speedScale + '×';
 }
 
 // Override zoom level if explicitly specified in preset
 if(presetObj.zoomLevel !== undefined) {
     viewport.setZoom(presetObj.zoomLevel);
 }
 
 // Override pan offset if explicitly specified in preset
 if(presetObj.offsetX !== undefined || presetObj.offsetY !== undefined) {
     viewport.setPan(
         presetObj.offsetX !== undefined ? presetObj.offsetX : viewport.offsetX,
         presetObj.offsetY !== undefined ? presetObj.offsetY : viewport.offsetY
     );
 }
 
 buildGrid();
 recalcScaleAndRange();
 adjustWaveMenuForScrollbar();
}

function applyPreset(presetName){
 if(!presets[presetName]) return;
 currentPreset = presetName; // Store
 const presetObj = presets[presetName];
 applyPresetConfig(presetObj);
}

// Call init after all definitions are complete
init();
// ===== Title bar dynamic layout (early drop for center; hysteresis-free) =====
function applyTitleBarLayout(){
 const row = document.getElementById('title-bar-row');
 const left = document.getElementById('title-bar-left');
 const center = document.getElementById('title-bar-center');
 const right = document.getElementById('title-bar-right');
 if(!row || !left || !center || !right) return;
 // Temporarily force single-row to measure fairly
 const hadBreak = row.classList.contains('break-center');
 if(hadBreak) row.classList.remove('break-center');
 // Ensure center can actually shrink in grid (override legacy min-width)
 row.style.gridTemplateColumns = 'auto 1fr auto';
 const cs = getComputedStyle(row);
 const gap = parseFloat(cs.columnGap || cs.gap || 0) || 0;
 const padL = parseFloat(cs.paddingLeft)||0;
 const padR = parseFloat(cs.paddingRight)||0;
 const containerW = row.clientWidth - padL - padR;
 const needed = left.offsetWidth + gap + center.offsetWidth + gap + right.offsetWidth;
 const slack = 12;
 if(needed >= containerW - slack){ row.classList.add('break-center'); }
 else { row.classList.remove('break-center'); }
}
(function(){
 const row = document.getElementById('title-bar-row');
 const left = document.getElementById('title-bar-left');
 const center = document.getElementById('title-bar-center');
 const right = document.getElementById('title-bar-right');
 if(!row || !left || !center || !right) return;
 const ro = new ResizeObserver(applyTitleBarLayout);
 ro.observe(row); ro.observe(left); ro.observe(center); ro.observe(right);
 window.addEventListener('resize', applyTitleBarLayout);
 window.addEventListener('load', ()=> setTimeout(applyTitleBarLayout, 0));
})();
</script>

<script>
// --- PRESET OVERRIDE VIA URL PARAMETER 
(function(){
  function applyPresetOverride(){
    var presetSelect = document.getElementById('presetSelect');
    if(!presetSelect) return;
    var params = new URLSearchParams(window.location.search);
    var override = params.get('preset');
    if (override && Array.from(presetSelect.options).some(function(o){return o.value===override;})) {
      presetSelect.value = override;
    } else {
      presetSelect.value = 'singleLens';
    }
    presetSelect.dispatchEvent(new Event('change'));
  }
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    // Delay one tick to allow any other init to wire listeners
    setTimeout(applyPresetOverride, 0);
  } else {
    window.addEventListener('DOMContentLoaded', function(){ setTimeout(applyPresetOverride, 0); });
  }
})();
</script>
